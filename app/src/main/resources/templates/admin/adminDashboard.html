<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}">
</head>
<body>

    <div id="header"></div>

    <main class="dashboard-container">

        <div class="dashboard-controls">
            <input type="text" id="searchBar" placeholder="Search doctor by name..." />

            <select id="filterTime">
                <option value="">Filter by Time</option>
                <option value="AM">AM</option>
                <option value="PM">PM</option>
            </select>

            <select id="filterSpecialty">
                <option value="">Filter by Specialty</option>
                <option value="cardiology">Cardiology</option>
                <option value="dermatology">Dermatology</option>
                <option value="neurology">Neurology</option>
                <option value="pediatrics">Pediatrics</option>
                <option value="orthopedics">Orthopedics</option>
            </select>

            <button id="addDocBtn" class="adminBtn">Add Doctor</button>
        </div>

        <div id="content" class="doctor-grid">
            <!-- Doctor cards injected here by adminDashboard.js -->
        </div>

    </main>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="footer"></div>

    <script th:src="@{/js/render.js}"></script>
    <script th:src="@{/js/util.js}"></script>
    <script th:src="@{/js/components/header.js}"></script>
    <script th:src="@{/js/components/footer.js}"></script>
    <script th:src="@{/js/components/modals.js}"></script>
    <script th:src="@{/js/components/doctorCard.js}"></script>
    <script th:src="@{/js/services/doctorServices.js}"></script>
    <script th:src="@{/js/adminDashboard.js}"></script>

</body>
</html>
