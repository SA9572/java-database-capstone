<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctor Dashboard</title>
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/doctorDashboard.css}">
</head>
<body>

    <div id="header"></div>

    <main class="dashboard-container">

        <div class="dashboard-controls">
            <input type="text" id="searchBar" placeholder="Search by patient name..." />
            <input type="date" id="filterDate" />
            <button id="todayBtn" class="adminBtn">Today</button>
        </div>

        <table class="appointment-table">
            <thead>
                <tr>
                    <th>Patient Name</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Prescriptions</th>
                </tr>
            </thead>
            <tbody id="patientTableBody">
                <!-- Rows injected by doctorDashboard.js -->
            </tbody>
        </table>

        <p id="noAppointmentsMsg" class="no-results hidden">No appointments found.</p>

    </main>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="footer"></div>

    <script type="module" th:src="@{/js/util.js}"></script>
    <script type="module" th:src="@{/js/components/header.js}"></script>
    <script type="module" th:src="@{/js/components/footer.js}"></script>
    <script type="module" th:src="@{/js/components/modals.js}"></script>
    <script type="module" th:src="@{/js/services/patientServices.js}"></script>
    <script type="module" th:src="@{/js/doctorDashboard.js}"></script>

</body>
</html>
